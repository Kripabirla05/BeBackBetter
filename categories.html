<style>
.sem-section { padding: 60px 0; border-top: 1px solid var(--border); }
.sem-section:first-of-type { border-top: none; padding-top: 60px; }
.sem-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 32px; flex-wrap: wrap; gap: 12px;
}
.sem-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--ink); color: white;
  padding: 8px 18px;
  border-radius: 8px;
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem;
  font-weight: 600;
}
.sem-badge.locked { background: var(--border); color: var(--muted); }
.sem-credits {
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  color: var(--muted);
  background: white;
  border: 1px solid var(--border);
  padding: 6px 14px;
  border-radius: 6px;
}

.subject-card {
  background: white;
  border-radius: var(--r);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  transition: var(--trans);
  position: relative;
  overflow: hidden;
}
.subject-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
}
.subject-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); }
.subject-card.locked {
  opacity: 0.55;
  cursor: not-allowed;
  background: var(--paper);
}
.subject-card.locked:hover { transform: none; box-shadow: var(--shadow-sm); }
.sub-icon-row { display: flex; align-items: center; justify-content: space-between; }
.sub-icon {
  width: 46px; height: 46px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
}
.sub-name { font-size: 0.9rem; font-weight: 700; color: var(--ink); line-height: 1.3; }
.sub-code {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
  margin-top: 2px;
}
.sub-meta { display: flex; flex-direction: column; gap: 4px; font-size: 0.78rem; color: var(--muted); }
.sub-meta span { display: flex; align-items: center; gap: 6px; }
.sub-meta i { width: 14px; color: var(--accent2); }
.sub-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--accent2);
  padding: 7px 14px;
  border-radius: 6px;
  background: rgba(37,99,235,0.08);
  transition: var(--trans);
  width: fit-content;
}
.sub-link:hover { background: var(--accent2); color: white; }
.sub-link.locked-link { color: var(--muted); background: var(--border); pointer-events: none; }

/* Locked overlay */
.locked-overlay {
  padding: 40px 0;
  text-align: center;
  background: white;
  border-radius: var(--r);
  border: 2px dashed var(--border);
  color: var(--muted);
}
.locked-overlay i { font-size: 2rem; margin-bottom: 10px; display: block; }
.locked-overlay p { font-size: 0.85rem; line-height: 1.6; }
</style>
</head>

function semLabel(s) {

function renderSubjectCard(sub, locked) {
  const c = colorMap[sub.color];

    <div class="subject-card${locked?' locked':''}">
      <div class="sub-icon-row">
